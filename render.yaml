services:
  - type: web
    name: frecha-iotech
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn frecha_iotech.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: frecha-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "frecha-iotech.onrender.com,localhost,127.0.0.1"

databases:
  - name: frecha-db
    plan: free
    databaseName: frecha_db
    user: frecha_user


